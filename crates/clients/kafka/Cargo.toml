[package]
name = "kafka-client"
edition.workspace = true
version.workspace = true
license-file.workspace = true

[dependencies]
amp-config = { path = "../../config" }
backon.workspace = true
chrono.workspace = true
monitoring = { path = "../../core/monitoring" }
prost.workspace = true
rskafka = { version = "0.6", features = ["transport-tls"] }
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12"] }
webpki-roots = "0.26"
thiserror.workspace = true
tokio.workspace = true
tracing.workspace = true
uuid = { workspace = true, features = ["v7"] }

# Protobuf code generation dependencies (see README.md "Protobuf Code Generation" section)
# These dependencies are only included when the gen_proto cfg flag is enabled
[target.'cfg(gen_proto)'.build-dependencies]
prost-build.workspace = true

[lints.rust]
# Allow the gen_proto cfg flag used for conditional protobuf code generation
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(gen_proto)'] }
