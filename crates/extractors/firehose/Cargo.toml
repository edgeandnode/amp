[package]
name = "firehose-datasets"
edition.workspace = true
version.workspace = true
license-file.workspace = true

[features]
# JSON Schema generation support for Firehose dataset manifest validation.
schemars = ["dep:schemars", "datasets-common/schemars", "datasets-raw/schemars", "dep:serde_json"]

[dependencies]
amp-providers-firehose = { path = "../../core/providers-firehose" }
datasets-common = { path = "../../core/datasets-common" }
datasets-raw = { path = "../../core/datasets-raw" }
schemars = { workspace = true, optional = true }
serde.workspace = true
serde_json = { workspace = true, optional = true }
thiserror.workspace = true
